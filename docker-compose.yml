services:
  solace-semp-mcp:
    build:
      context: .
      args:
        VERSION: "1.0.0"
    image: tanendra/solace-semp-mcp:1.0.0
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Enforce SSE mode regardless of MCP_TRANSPORT value in .env.
      # docker-compose.yml always deploys in SSE mode — the health check requires it.
      # To use stdio mode, run the container directly with -e MCP_TRANSPORT=stdio --no-healthcheck.
      MCP_TRANSPORT: sse
    volumes:
      # Uncomment the line below to load brokers from a file instead of env vars.
      # The target path must be /app/brokers.json — any other path is silently ignored.
      # - ./brokers.json:/app/brokers.json:ro
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:' + (process.env.PORT || 3000) + '/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  logs:
