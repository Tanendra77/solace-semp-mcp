services:
  solace-semp-mcp:
    build:
      context: .
      args:
        VERSION: "1.0.0"
    image: <DOCKER_HUB_USERNAME>/solace-semp-mcp:1.0.0
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Uncomment the line below to load brokers from a file instead of env vars.
      # The target path must be /app/brokers.json — any other path is silently ignored.
      # - ./brokers.json:/app/brokers.json:ro
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  logs:
